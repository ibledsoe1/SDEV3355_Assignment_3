name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # dummy url for testing
      POSTGRES_URL: postgresql+asyncpg://user:password@localhost/testdb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
        
      - name: product_service install dependencies
        run: pip install -r campus_store/product_service/requirements.txt

      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Build product_service image
        run: docker build -t product_service ./campus_store/product_service
        
